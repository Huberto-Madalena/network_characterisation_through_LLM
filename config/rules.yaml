---
queries:
  - id: "ultimate_audit"
    description: "extract metrics for possible netadmin questions."
    data_plane:
      extract_fields:
        # === 1. Basis-Metriken (Frame) ===
        - "frame.len"

        # === 2. Layer 3 (IPv4 & IPv6 Routing) ===
        - "ip.src"
        - "ip.dst"
        - "ip.ttl"
        - "ip.proto"
        - "ipv6.src"
        - "ipv6.dst"
        - "ipv6.hlim"

        # === 3. Layer 4 (Ports & Payload) ===
        - "tcp.srcport"
        - "tcp.dstport"
        - "tcp.len"
        - "udp.srcport"
        - "udp.dstport"
        - "udp.length"

        # === 4. Layer 4 (TCP Flags) ===
        - "tcp.flags.syn"
        - "tcp.flags.ack"
        - "tcp.flags.fin"
        - "tcp.flags.reset"
        - "tcp.flags.push"
        - "tcp.flags.urg"
        - "tcp.flags.cwr"
        - "tcp.flags.ece"

         # === 5. error/ctrl (ICMP) ===
        - "icmp.type"
        - "icmp.code"
